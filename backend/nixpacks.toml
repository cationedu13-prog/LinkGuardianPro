[phases.setup]
nixPkgs = ["python311", "chromium", "nss", "freetype", "freetype-dev", "harfbuzz", "ca-certificates", "ttf-freefont"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium || true"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
