# nixpacks.toml – Railway build configuration
# Installs system dependencies needed for Playwright (headless Chromium)
# If ENABLE_PLAYWRIGHT=false, these are still installed but unused (harmless)

[phases.setup]
nixPkgs = [
  "chromium",
  "chromium-sandbox",
  "nss",
  "nspr",
  "at-spi2-atk",
  "at-spi2-core",
  "atk",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "glib",
  "glibc",
  "libdrm",
  "libgbm",
  "libX11",
  "libxcb",
  "libXcomposite",
  "libXdamage",
  "libXext",
  "libXfixes",
  "libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps || true"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"
