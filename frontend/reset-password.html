<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password – LinkGuardian Pro</title>
  <style>
    :root {
      --bg: #0B0F1A; --surface: #151B28; --surface-2: #1B2230;
      --border: rgba(255,255,255,0.08); --text-1: #F8FAFC; --text-2: #CBD5E1; --text-3: #94A3B8;
      --cyan: #00E5FF; --cyan-soft: rgba(0,229,255,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text-1);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1.5rem; padding: 2rem; max-width: 420px; width: 100%;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center; margin-bottom: 1rem;
      font-size: 1.5rem; font-weight: 800; color: var(--cyan);
      text-decoration: none; display: inline-block; width: 100%;
    }
    h1 { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: var(--text-3); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--text-2); margin-bottom: 0.25rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    input {
      width: 100%; padding: 0.75rem; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 0.75rem;
      color: var(--text-1); font-size: 0.9rem;
    }
    input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-soft); }
    .btn {
      width: 100%; padding: 0.75rem; background: var(--cyan); color: #000;
      border: none; border-radius: 0.75rem; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 0.5rem;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .alert-box { display: none; padding: 0.75rem; border-radius: 0.75rem; margin-bottom: 1rem; font-size: 0.85rem; }
    .alert-box.show { display: block; }
    .alert-box.error   { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
    .alert-box.success { background: var(--cyan-soft); color: var(--cyan); border: 1px solid var(--cyan); }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
    .auth-footer a { color: var(--cyan); text-decoration: none; }
    #invalidState { text-align: center; padding: 1rem 0; }
    #invalidState p { color: var(--text-3); margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="auth-card">
  <a href="/" class="logo">LinkGuardian Pro</a>
  <h1>Set New Password</h1>
  <p class="subtitle">Enter your new password below.</p>

  <!-- Shown when token is missing/invalid on page load -->
  <div id="invalidState" class="hidden">
    <p>This reset link is invalid or has expired.</p>
    <a href="/forgot-password" class="btn" style="display:inline-flex;width:auto;padding:0.75rem 1.5rem;">
      Request New Link
    </a>
  </div>

  <!-- Main form (shown when token is present) -->
  <div id="mainForm">
    <div class="alert-box" id="alertBox"></div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Min. 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">
      <span id="resetBtnText">Set New Password</span>
      <span class="spinner hidden" id="resetSpinner"></span>
    </button>
  </div>

  <div class="auth-footer">
    <a href="/login">← Back to Login</a>
  </div>
</div>

<script>
const API = '';

// Read token from URL on page load
const urlParams = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('token');

if (!resetToken) {
  document.getElementById('mainForm').classList.add('hidden');
  document.getElementById('invalidState').classList.remove('hidden');
}

async function doReset() {
  const newPassword     = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const alertBox        = document.getElementById('alertBox');
  const btn             = document.getElementById('resetBtn');
  const spinner         = document.getElementById('resetSpinner');
  const btnText         = document.getElementById('resetBtnText');

  if (!newPassword || !confirmPassword) {
    alertBox.textContent = 'Please fill in both password fields.';
    alertBox.className   = 'alert-box show error';
    return;
  }
  if (newPassword.length < 8) {
    alertBox.textContent = 'Password must be at least 8 characters.';
    alertBox.className   = 'alert-box show error';
    return;
  }
  if (newPassword !== confirmPassword) {
    alertBox.textContent = 'Passwords do not match.';
    alertBox.className   = 'alert-box show error';
    return;
  }

  btn.disabled = true;
  spinner.classList.remove('hidden');
  btnText.textContent = 'Resetting…';

  try {
    const resp = await fetch(`${API}/api/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: newPassword }),
    });
    const data = await resp.json();

    if (resp.ok) {
      alertBox.textContent = 'Password reset! Redirecting to login…';
      alertBox.className   = 'alert-box show success';
      setTimeout(() => window.location.href = '/login', 1800);
    } else {
      alertBox.textContent = data.error || 'Reset failed. Please try again.';
      alertBox.className   = 'alert-box show error';
    }
  } catch (e) {
    alertBox.textContent = 'Network error. Check your connection.';
    alertBox.className   = 'alert-box show error';
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
    btnText.textContent = 'Set New Password';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doReset();
});
</script>
</body>
</html>
