<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – LinkGuardian Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" class="nav-logo"><div class="nav-logo-icon">🛡</div> LinkGuardian Pro</a>
    </div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter your email address, we'll send you a password reset link.</p>
    <div class="alert-box" id="alertBox"></div>
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="resetEmail" class="form-input" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="sendResetLink()">Send Reset Link</button>
    </div>
    <div class="auth-footer">
      <a href="/login">Back to Login</a>
    </div>
  </div>
</div>
<script>
const API = '';
async function sendResetLink() {
  const email = document.getElementById('resetEmail').value.trim();
  const alertBox = document.getElementById('alertBox');
  if (!email) {
    alertBox.textContent = 'Please enter your email.';
    alertBox.className = 'alert-box show error';
    return;
  }
  alertBox.textContent = 'Sending...';
  alertBox.className = 'alert-box show';
  try {
    const resp = await fetch(`${API}/api/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await resp.json();
    if (resp.ok) {
      alertBox.textContent = 'Reset link sent! Check your email.';
      alertBox.className = 'alert-box show success';
    } else {
      alertBox.textContent = data.error || 'Failed to send. Try again.';
      alertBox.className = 'alert-box show error';
    }
  } catch(e) {
    alertBox.textContent = 'Network error.';
    alertBox.className = 'alert-box show error';
  }
}
</script>
</body>
</html>
