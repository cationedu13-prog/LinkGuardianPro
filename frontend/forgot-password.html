<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/config.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AffiGuard</title>
  <style>
    :root {
      --bg: #0B0F1A; --surface: #151B28; --surface-2: #1B2230;
      --border: rgba(255,255,255,0.08); --text-1: #F8FAFC; --text-2: #CBD5E1; --text-3: #94A3B8;
      --cyan: #00E5FF; --cyan-soft: rgba(0,229,255,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text-1);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      -webkit-text-size-adjust: 100%;
    }
    @media (max-width: 400px) {
      body { padding: 0.75rem; align-items: flex-start; padding-top: 2rem; }
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1.5rem; padding: 2rem; max-width: 420px; width: 100%;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }
    @media (max-width: 400px) {
      .auth-card { padding: 1.5rem 1.25rem; border-radius: 1.25rem; }
    }
    .logo {
      text-align: center; margin-bottom: 1.5rem;
      font-size: 1.5rem; font-weight: 800; color: var(--cyan);
      text-decoration: none; display: inline-block; width: 100%;
    }
    h1 { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
    @media (max-width: 400px) { h1 { font-size: 1.4rem; } }
    .subtitle { text-align: center; color: var(--text-3); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.5; }

    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--text-2); margin-bottom: 0.25rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    input {
      width: 100%; padding: 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 0.75rem;
      color: var(--text-1); font-size: 1rem;
      -webkit-appearance: none; appearance: none;
    }
    input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-soft); }

    .btn {
      width: 100%; padding: 0.85rem;
      background: var(--cyan); color: #000;
      border: none; border-radius: 0.75rem;
      font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      min-height: 48px; touch-action: manipulation;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { opacity: 0.85; transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }

    .alert-box { display: none; padding: 0.75rem; border-radius: 0.75rem; margin-bottom: 1rem; font-size: 0.85rem; line-height: 1.45; }
    .alert-box.show { display: block; }
    .alert-box.error   { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
    .alert-box.success { background: var(--cyan-soft); color: var(--cyan); border: 1px solid rgba(0,229,255,0.4); }

    /* Success state — shown after email is sent */
    .success-state { display: none; text-align: center; padding: 0.5rem 0; }
    .success-state.show { display: block; }
    .success-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .success-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--cyan); }
    .success-state p { font-size: 0.85rem; color: var(--text-3); line-height: 1.6; margin-bottom: 0.4rem; }

    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-3); }
    .auth-footer a { color: var(--cyan); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-card">
  <a href="/" class="logo">AffiGuard</a>
  <h1>Forgot Password?</h1>
  <p class="subtitle">Enter your email and we'll send you a reset link. It expires in 1 hour.</p>

  <!-- Main form -->
  <div id="mainForm">
    <div class="alert-box" id="alertBox"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn" id="submitBtn" onclick="doForgot()">
      <span id="btnText">Send Reset Link</span>
      <span class="spinner hidden" id="btnSpinner"></span>
    </button>
  </div>

  <!-- Success state (shown after submit) -->
  <div class="success-state" id="successState">
    <div class="success-icon">📧</div>
    <h2>Check your inbox</h2>
    <p>If <strong id="sentEmail" style="color:var(--text-2);"></strong> is registered, a reset link has been sent.</p>
    <p>Didn't receive it? Check your spam folder or <a href="#" onclick="showFormAgain()" style="color:var(--cyan);">try again</a>.</p>
  </div>

  <div class="auth-footer">
    Remembered it? <a href="/login">Back to Login →</a>
  </div>
</div>

<script>
const API = window.__BACKEND_URL || '';

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}

async function doForgot() {
  const email     = document.getElementById('email').value.trim();
  const alertBox  = document.getElementById('alertBox');
  const btn       = document.getElementById('submitBtn');
  const btnText   = document.getElementById('btnText');
  const spinner   = document.getElementById('btnSpinner');

  if (!email) {
    alertBox.textContent = 'Please enter your email address.';
    alertBox.className = 'alert-box show error';
    return;
  }
  if (!isValidEmail(email)) {
    alertBox.textContent = 'Please enter a valid email address.';
    alertBox.className = 'alert-box show error';
    return;
  }

  btn.disabled = true;
  spinner.classList.remove('hidden');
  btnText.textContent = 'Sending…';
  alertBox.className = 'alert-box';

  try {
    const resp = await fetch(`${API}/api/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await resp.json();

    if (resp.ok) {
      // Show success state — always same message (prevents email enumeration)
      document.getElementById('mainForm').style.display = 'none';
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('successState').classList.add('show');
    } else {
      alertBox.textContent = data.error || 'Something went wrong. Please try again.';
      alertBox.className = 'alert-box show error';
    }
  } catch (e) {
    alertBox.textContent = 'Network error. Check your connection and try again.';
    alertBox.className = 'alert-box show error';
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
    btnText.textContent = 'Send Reset Link';
  }
}

function showFormAgain() {
  document.getElementById('successState').classList.remove('show');
  document.getElementById('mainForm').style.display = '';
  document.getElementById('email').focus();
}

document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doForgot();
});
</script>
</body>
</html>
